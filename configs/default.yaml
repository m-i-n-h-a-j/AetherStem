# AetherStem Default Configuration

# Audio Processing Settings
audio:
  sample_rate: 96000          # Target sample rate (Hz)
  channels: 2                 # Target channels (Stereo)
  bit_depth: 32               # Target bit depth (float)
  format: "wav"               # Target format

# DSP / AI Pipeline Settings
pipeline:
  chunk_size: 4096            # Number of samples per chunk
  overlap_ratio: 0.25         # Overlap ratio between chunks
  hop_length: 1024            # Calculated as chunk_size * (1 - overlap_ratio)
  backend: "auto"
  device: "auto"
  fallback_to_cpu: true

# AI Restoration Settings
ai:
  models:
    separate: "demucs-runtime"
    denoise: "denoise-placeholder"
    declip: "denoise-placeholder"
    enhance: "enhancement-placeholder"
  validation_thresholds:
    noise_floor_db: -55.0
    lossy_confidence: 0.65
    artifact_threshold: 0.75
  denoise_strength: 0.5
  enhancement_intensity: 0.5
  provider: "auto"
  precision: "fp32"
  low_memory: false
  model_path: null

# Path Settings
paths:
  temp_dir: "temp"
  output_dir: "output"
  logs_dir: "logs"
  exports_dir: "exports"
  benchmarks_dir: "benchmarks"

# Metadata
metadata:
  app_name: "AetherStem"
  version: "0.4.0"
